name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The compositor's seat keyboard compiles an xkb keymap, so the Wayland
      # stack links libxkbcommon (and pulls its keymap data). The software
      # renderer (the `render` feature) links libpixman. The winit/EGL/GL bindings
      # are pure Rust (loaded at runtime), but the bare-metal DRM/KMS backend (the
      # `udev` feature) links real system libraries: libdrm, libgbm, libinput,
      # libseat, and libudev.
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libpixman-1-dev libdrm-dev libgbm-dev libinput-dev libseat-dev libudev-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy -p compositor --all-targets --features render -- -D warnings
      # Let the cells confinement tests actually run unprivileged user
      # namespaces; Ubuntu restricts these by default. Harmless where the knob
      # is absent, and the tests skip themselves if it stays off.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: cargo test --all
      # The offscreen software renderer: imports a client's shm buffer,
      # composites the scene, and asserts on the read-back pixels. Headless, so
      # it runs in CI like the protocol tests.
      - run: cargo test -p compositor --features render
      # The on-screen winit backend needs a display and a GPU to run (verified by
      # eye, not here), but it must keep compiling. The Wayland/EGL/GL it pulls
      # are runtime-loaded, so a build needs no extra system libraries.
      - run: cargo build -p compositor --features winit
      # The bare-metal DRM/KMS + libinput backend needs a real GPU and a seat to
      # run (verified by eye on hardware, not here), but it must keep compiling.
      # It links the DRM system libraries installed above.
      - run: cargo build -p compositor --features udev
      - run: cargo clippy -p compositor --all-targets --features udev -- -D warnings
      # The horizon Glass shell behind the backends is feature-gated, so the
      # default build above never compiles it. Lint and run it under one backend
      # feature (the shell is shared by both): this compile-checks the shell and
      # the confined-launch path and runs the headless client-cell tests, which
      # assert the cell a launched client gets (the socket bound where its env
      # points) and confirm a confined client reaches the display through the bind
      # despite the empty network namespace. Needs the userns knob set above.
      - run: cargo clippy -p horizon --all-targets --features compositor-winit -- -D warnings
      - run: cargo test -p horizon --features compositor-winit
      # The identity crate's real FIDO2 authenticator (the `fido2` feature) talks to
      # a USB security key, verified on real hardware, not here, but it must keep
      # compiling. It statically builds hidapi's hidraw backend, which links libudev
      # (installed above); no new system package. clippy compiles, so this also
      # build-checks the crate and the `horizon identity ... --fido2` path. The
      # portable keyslot core (the default build) is tested by `cargo test --all`.
      - run: cargo clippy -p identity --all-targets --features fido2 -- -D warnings
      - run: cargo clippy -p horizon --all-targets --features identity-fido2 -- -D warnings
