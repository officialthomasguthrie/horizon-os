name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The compositor's seat keyboard compiles an xkb keymap, so the Wayland
      # stack links libxkbcommon (and pulls its keymap data). The software
      # renderer (the `render` feature) links libpixman. The winit/EGL/GL bindings
      # are pure Rust (loaded at runtime), but the bare-metal DRM/KMS backend (the
      # `udev` feature) links real system libraries: libdrm, libgbm, libinput,
      # libseat, and libudev. cryptsetup-bin provides veritysetup, the reference
      # the keybuild dm-verity tests cross-check the hash tree against byte-for-byte
      # (an unprivileged, file-only check: no loop devices, so it runs in CI). gdisk
      # provides sgdisk, the reference the keybuild GPT test cross-checks the assembled
      # disk's partition table against (also file-only, so it runs in CI). cmake and
      # clang/libclang build the Aura `llama` feature's engine: llama-cpp-sys builds
      # llama.cpp from source with cmake and generates its bindings with libclang.
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libpixman-1-dev libdrm-dev libgbm-dev libinput-dev libseat-dev libudev-dev cryptsetup-bin gdisk cmake clang libclang-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy -p compositor --all-targets --features render -- -D warnings
      # Let the cells confinement tests actually run unprivileged user
      # namespaces; Ubuntu restricts these by default. Harmless where the knob
      # is absent, and the tests skip themselves if it stays off.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: cargo test --all
      # The offscreen software renderer: imports a client's shm buffer,
      # composites the scene, and asserts on the read-back pixels. Headless, so
      # it runs in CI like the protocol tests.
      - run: cargo test -p compositor --features render
      # The on-screen winit backend needs a display and a GPU to run (verified by
      # eye, not here), but it must keep compiling. The Wayland/EGL/GL it pulls
      # are runtime-loaded, so a build needs no extra system libraries.
      - run: cargo build -p compositor --features winit
      # The bare-metal DRM/KMS + libinput backend needs a real GPU and a seat to
      # run (verified by eye on hardware, not here), but it must keep compiling.
      # It links the DRM system libraries installed above.
      - run: cargo build -p compositor --features udev
      - run: cargo clippy -p compositor --all-targets --features udev -- -D warnings
      # The software DRM/KMS scanout backend (no GPU): it composites with pixman
      # into a dumb buffer and page-flips it, so it runs on any KMS device and is
      # eye-verified in QEMU on plain virtio-gpu, not here, but it must keep
      # compiling. It links the same DRM system libraries as udev (installed above),
      # not GLES.
      - run: cargo build -p compositor --features softdrm
      - run: cargo clippy -p compositor --all-targets --features softdrm -- -D warnings
      # The horizon Glass shell behind the backends is feature-gated, so the
      # default build above never compiles it. Lint and run it under one backend
      # feature (the shell is shared by both): this compile-checks the shell and
      # the confined-launch path and runs the headless client-cell tests, which
      # assert the cell a launched client gets (the socket bound where its env
      # points) and confirm a confined client reaches the display through the bind
      # despite the empty network namespace. Needs the userns knob set above.
      - run: cargo clippy -p horizon --all-targets --features compositor-winit -- -D warnings
      - run: cargo test -p horizon --features compositor-winit
      # The software DRM backend's CLI wiring (the `compositor softdrm` command and
      # the boot path that launches it) only compiles under compositor-softdrm, so
      # lint it too; the shell it drives is the same one the winit step runs.
      - run: cargo clippy -p horizon --all-targets --features compositor-softdrm -- -D warnings
      # The identity crate's real FIDO2 authenticator (the `fido2` feature) talks to
      # a USB security key, verified on real hardware, not here, but it must keep
      # compiling. It statically builds hidapi's hidraw backend, which links libudev
      # (installed above); no new system package. clippy compiles, so this also
      # build-checks the crate and the `horizon identity ... --fido2` path. The
      # portable keyslot core (the default build) is tested by `cargo test --all`.
      - run: cargo clippy -p identity --all-targets --features fido2 -- -D warnings
      - run: cargo clippy -p horizon --all-targets --features identity-fido2 -- -D warnings
      # The initramfs touch-to-boot path: `init`'s `fido2` feature wires identity's
      # HardwareKey into horizon-init so a security key recovers the master at boot.
      # It pulls the same libudev-linked hidraw backend, runs on real hardware, and
      # otherwise must keep compiling; the default build (passphrase + software token)
      # is tested by `cargo test --all`.
      - run: cargo clippy -p init --all-targets --features fido2 -- -D warnings
      # The Aura semantic layer's real embedding model (aura's `llama` feature) runs a
      # GGUF model over llama.cpp, eye-verified on this project's Mac (Metal/CPU) with a
      # 334 MB EmbeddingGemma, not here (no weights in CI), but it must keep compiling.
      # llama-cpp-sys builds llama.cpp from source with cmake and generates bindings with
      # libclang (both installed above); clippy compiles it, so this build-checks the
      # GgufEmbedder and the `horizon aura ... --model` path. The model-gated embedder
      # tests skip themselves with no weights, and the deterministic hashing path (the
      # default build) is tested by `cargo test --all`.
      - run: cargo clippy -p aura --all-targets --features llama -- -D warnings
      - run: cargo clippy -p horizon --all-targets --features aura-llama -- -D warnings
