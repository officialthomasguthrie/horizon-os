name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The compositor's seat keyboard compiles an xkb keymap, so the Wayland
      # stack links libxkbcommon (and pulls its keymap data). The software
      # renderer (the `render` feature) links libpixman. The rest of the Wayland
      # server, and the winit/EGL/GL bindings, are pure Rust (loaded at runtime).
      - run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libpixman-1-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy -p compositor --all-targets --features render -- -D warnings
      # Let the cells confinement tests actually run unprivileged user
      # namespaces; Ubuntu restricts these by default. Harmless where the knob
      # is absent, and the tests skip themselves if it stays off.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: cargo test --all
      # The offscreen software renderer: imports a client's shm buffer,
      # composites the scene, and asserts on the read-back pixels. Headless, so
      # it runs in CI like the protocol tests.
      - run: cargo test -p compositor --features render
      # The on-screen winit backend needs a display and a GPU to run (verified by
      # eye, not here), but it must keep compiling. The Wayland/EGL/GL it pulls
      # are runtime-loaded, so a build needs no extra system libraries.
      - run: cargo build -p compositor --features winit
